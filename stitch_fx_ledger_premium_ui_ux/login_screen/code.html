<!DOCTYPE html>

              "fontFamily": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .form-input-focus:focus-within {
            border-color: #0058be;
            box-shadow: 0 0 0 1px #0058be;
        }
        body {
            background-color: #f8f9ff;
        }
    </style>

<body class="min-h-screen flex flex-col justify-center items-center font-body-md text-on-background selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<main class="w-full max-w-[420px] px-container-margin py-xl flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-xl animate-fade-in">
<img alt="Executive FX Ledger brand logo showing a book with currency exchange arrows, deep navy and green professional color scheme." class="w-32 h-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5_gxnIRArDg4mHD-lTBDRYSqJcu0cPl9jq3bleGzXqll11aAHqwvEM9-IPJlFxsjiP2sourjaVVFoJq33-1vVRJAU0Dn81SlMFhRjQuwLhI5qHPuAZxWakaHtWsBhC_2rhae0wFPWSILz95VYJLIGx_0C4XKM_IccREhlrg-9AGJfwvFeTp4n9hcAaoKREbHe9EtNHzMLSfnWsbEPUX9uWHtHSOYGPqmikEc2jqUj6xARLjeTS2jV5u5c26PucLXcveC3bkQOuLJs"/>
</div>
<!-- Headline Section -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary mb-base">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Securely manage your global FX ledger</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-md" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-outline ml-base" for="email">EMAIL / USERNAME</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-md text-outline group-focus-within:text-secondary">mail</span>
<input class="w-full h-[48px] pl-12 pr-md bg-surface border border-outline-variant rounded-xl font-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="email" name="email" placeholder="e.g. treasury@corp.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center px-base">
<label class="font-label-caps text-label-caps text-outline" for="password">PASSWORD</label>
<a class="font-label-caps text-label-caps text-secondary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-md text-outline group-focus-within:text-secondary">lock</span>
<input class="w-full h-[48px] pl-12 pr-md bg-surface border border-outline-variant rounded-xl font-body-md text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-sm space-y-md">
<!-- Primary Sign In -->
<button class="w-full h-[48px] bg-primary text-on-primary rounded-xl font-headline-sm text-headline-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-sm" type="submit">
                    Sign In
                </button>
<!-- Divider -->
<div class="flex items-center gap-md py-sm">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-caps text-label-caps text-outline">OR SECURE ACCESS</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Biometric Access -->
<button class="w-full h-[48px] border border-outline-variant text-on-surface rounded-xl font-data-md text-data-md hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined">fingerprint</span>
                    Use Biometrics
                </button>
</div>
</form>
<!-- Footer Link -->
<footer class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-data-md text-data-md text-secondary font-semibold hover:underline ml-xs" href="#">Contact Admin</a>
</p>
</footer>
</main>
<!-- Subtle Visual Decorative Element -->
<div class="fixed top-0 right-0 p-lg opacity-20 pointer-events-none overflow-hidden">
<span class="material-symbols-outlined text-[120px] text-outline-variant" style="font-variation-settings: 'FILL' 0, 'wght' 100">shield_lock</span>
</div>
<script>
        // Simple micro-interaction for button press
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
</body></html>
